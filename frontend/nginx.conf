server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy /api/* → backend container
    # Use Docker's embedded DNS (127.0.0.11) and a variable so nginx resolves
    # the upstream at request time rather than at config-parse time. This avoids
    # a startup race where "backend" isn't resolvable yet when nginx parses its
    # config, which would otherwise crash-loop the container.
    location /api/ {
        resolver 127.0.0.11 valid=10s;
        set $backend_upstream http://backend:5000;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Proxy timeouts — give slow Gemini calls (up to 80s on the backend)
        # headroom so the backend can return a structured JSON error instead
        # of nginx emitting its own opaque HTML 504 page.
        proxy_connect_timeout 5s;
        proxy_send_timeout 90s;
        proxy_read_timeout 90s;
    }
}